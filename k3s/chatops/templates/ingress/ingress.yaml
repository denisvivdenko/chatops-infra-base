apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: chatops

spec:
  ingressClassName: ngrok
  rules:
    - host: "{{ .Values.ngrok.domain }}"
      http:
        paths:
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: backend-api
              port:
                number: 80

        - path: /monitoring
          pathType: Prefix
          backend:
            service:
              name: grafana
              port:
                number: 80

        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port:
                number: 80
