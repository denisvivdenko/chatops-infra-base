apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: chatops

spec:
  rules:
    - http:
        paths:

        - path: /api
          pathType: Prefix

          backend:
            service:
              name: backend-api
              port:
                number: 80

        - path: /
          pathType: Prefix

          backend:
            service:
              name: frontend
              port:
                number: 80
