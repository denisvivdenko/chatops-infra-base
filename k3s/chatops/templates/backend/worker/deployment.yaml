apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-worker

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend-worker

  template:
    metadata:
      labels:
        app: backend-worker

    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "i=0; until nc -z redis 6379; do i=$((i+1)); [ $i -ge 30 ] && echo 'Redis not ready after 60s' && exit 1; sleep 2; done"]

      containers:
        - name: backend-worker
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          env:
            - name: REDIS_HOST
              value: "redis"
          command: ["python", "-m", "chatops.workers.worker"]
