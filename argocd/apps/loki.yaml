apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: loki
  namespace: argocd

spec:
  project: chatops

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: "6.6.4"
      helm:
        valueFiles:
          - $values/values/loki.yaml

    - repoURL: https://github.com/denisvivdenko/chatops-infra-base.git
      targetRevision: HEAD
      ref: values
      path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true