apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: alloy
  namespace: argocd

spec:
  project: chatops

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: "0.9.2"
      helm:
        valueFiles:
          - $values/values/alloy.yaml

    - repoURL: https://github.com/denisvivdenko/chatops-infra-base.git
      targetRevision: HEAD
      ref: values
      path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
 