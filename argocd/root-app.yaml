apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: root
  namespace: argocd

spec:
  project: chatops

  source:
    repoURL: https://github.com/denisvivdenko/chatops-infra-base.git
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true