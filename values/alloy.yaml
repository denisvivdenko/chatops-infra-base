alloy:
  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "filtered" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = "dev"
          action        = "keep"
        }

        // Keep only pods explicitly opted in via label
        // e.g. metadata.labels.logging: "enabled"
        rule {
          source_labels = ["__meta_kubernetes_pod_label_logging"]
          regex         = "enabled"
          action        = "keep"
        }
      }

      // 3. Tail logs only for the filtered targets
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.filtered.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring:3100/loki/api/v1/push"
        }
      }